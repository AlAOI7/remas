<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الأولى - خمسة أسماء</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #764ba2;
            margin-bottom: 2rem;
            font-weight: bold;
        }

        .names-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }

        .name-link {
            display: block;
            background: linear-gradient(145deg, #f8f9ff, #e9ecef);
            padding: 1rem;
            border-radius: 60px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #4a4a8a;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .name-link:hover {
            transform: translateX(10px);
            background: #e0e7ff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-color: #764ba2;
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="emoji">🌟</div>
    <h1>اختر اسماً لترى صورته</h1>
    <div class="sub">⬇️ اضغط على أي اسم من الخمسة ⬇️</div>

    <div class="names-list">
        <!-- كل رابط يؤدي إلى page2.html مع معامل name -->
        <a href="page2.html?name=remas" class="name-link">🌸 ريماس المطيري</a>
    
    </div>

    <footer>✅ الصفحة الأولى تحتوي على  أسماء،  الاسم ينقلك للصفحة الثانية ليعرض صورتك الخاصة</footer>
</div>
</body>
</html>
